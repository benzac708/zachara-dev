{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "zachara-dev.fullname" . }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
{{- range .Values.ingress.hosts }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "zachara-dev.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
{{- end }}
{{- if .Values.ingress.tls }}
  tls:
    - hosts:
{{- range .Values.ingress.hosts }}
        - {{ . }}
{{- end }}
      secretName: {{ .Values.ingress.tlsSecretName | default (printf "%s-tls" (include "zachara-dev.fullname" .)) }}
{{- end }}
{{- end }}
