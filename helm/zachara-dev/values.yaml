replicaCount: 2

image:
  repository: ghcr.io/benzac708/zachara-dev
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - zachara.dev
    - www.zachara.dev
  tls: true
  tlsSecretName: ""

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi
