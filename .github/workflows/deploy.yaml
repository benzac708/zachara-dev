name: Build & Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - deploy/helm/zachara-dev/values-prod.yaml

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/benzac708/zachara-dev

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.actor != 'github-actions[bot]'

    env:
      CI_AI_MODEL: opencode/big-picle

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: AI-assisted smoke test
        run: scripts/ai-repair-ci.sh --label smoke-test --command "bun run test:smoke"

      - name: AI-assisted build
        run: scripts/ai-repair-ci.sh --label build --command "bun run build"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update production digest
        run: |
          python - <<'PY'
          import pathlib
          import re

          path = pathlib.Path('deploy/helm/zachara-dev/values-prod.yaml')
          content = path.read_text()
          digest = '${{ steps.build_image.outputs.digest }}'
          updated = re.sub(r'digest:\s*sha256:[0-9a-f]+', f'digest: {digest}', content)
          if updated == content:
              print('Digest already current; nothing to update.')
          else:
              path.write_text(updated)
              print(f'Updated production digest to {digest}')
          PY

      - name: Commit production digest
        run: |
          if git diff --quiet deploy/helm/zachara-dev/values-prod.yaml; then
            echo "Digest already current; nothing to push."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add deploy/helm/zachara-dev/values-prod.yaml
          git commit -m "chore: promote image ${{ steps.build_image.outputs.digest }}"
          git push

      - name: Deployment notice
        run: |
          echo "Image published to GHCR and production digest updated in git for ArgoCD sync."
