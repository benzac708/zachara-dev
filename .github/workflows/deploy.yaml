name: Build & Publish

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/benzac708/zachara-dev
  VPS_HOST: 92.5.82.69
  VPS_USER: ubuntu

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20

    env:
      CI_AI_MODEL: opencode/big-picle

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: AI-assisted smoke test
        run: scripts/ai-repair-ci.sh --label smoke-test --command "bun run test:smoke"

      - name: AI-assisted build
        run: scripts/ai-repair-ci.sh --label build --command "bun run build"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Configure SSH
        run: |
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keyscan -H "${VPS_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Deploy on VPS with Helm
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" "
            set -euo pipefail
            cd /home/${VPS_USER}/Repos/zachara-dev
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm upgrade --install zachara-dev ./deploy/helm/zachara-dev \
              --namespace zachara-dev-prod \
              --create-namespace \
              -f ./deploy/helm/zachara-dev/values-prod.yaml \
              --set-string image.digest=${{ steps.build_image.outputs.digest }} \
              --wait \
              --timeout 5m
          "

      - name: Deployment notice
        run: |
          echo "Image published to GHCR and deployed on the VPS with Helm."
