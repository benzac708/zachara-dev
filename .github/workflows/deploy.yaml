name: Build & Publish

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/benzac708/zachara-dev

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI_AI_MODEL: opencode/big-picle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: AI-assisted smoke test
        run: scripts/ai-repair-ci.sh --label smoke-test --command "bun run test:smoke"

      - name: AI-assisted build
        run: scripts/ai-repair-ci.sh --label build --command "bun run build"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deployment notice
        run: |
          echo "Image published to GHCR. Deploy it to the VPS with kubectl or your existing release process."
