name: Build & Publish

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/benzac708/zachara-dev

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20

    env:
      CI_AI_MODEL: opencode/big-picle

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: AI-assisted smoke test
        run: scripts/ai-repair-ci.sh --label smoke-test --command "bun run test:smoke"

      - name: AI-assisted build
        run: scripts/ai-repair-ci.sh --label build --command "bun run build"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Deploy to K3s with Helm
        run: |
          helm upgrade --install zachara-dev ./deploy/helm/zachara-dev \
            --namespace zachara-dev-prod \
            --create-namespace \
            -f ./deploy/helm/zachara-dev/values-prod.yaml \
            --set-string image.digest=${{ steps.build_image.outputs.digest }} \
            --atomic \
            --wait \
            --timeout 5m

      - name: Deployment notice
        run: |
          echo "Image published to GHCR and deployed directly to K3s with Helm."
