nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/benzac708/zachara-dev
  tag: latest
  digest: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

container:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

probes:
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  tls:
    enabled: true
    secretName: zachara-dev-tls
  hosts:
    - host: zachara.dev
      paths:
        - path: /
          pathType: Prefix
    - host: www.zachara.dev
      paths:
        - path: /
          pathType: Prefix

podLabels: {}

deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
