apiVersion: apps/v1
kind: Deployment
metadata:
  name: zachara-dev
  namespace: zachara-dev-prod
  labels:
    app: zachara-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zachara-dev
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: zachara-dev
    spec:
      containers:
        - name: zachara-dev
          image: ghcr.io/benzac708/zachara-dev:latest
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi